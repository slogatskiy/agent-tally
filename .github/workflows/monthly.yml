name: Monthly agent tally

# Scrapes Compass, updates the Excel, rebuilds the HTML widget, and commits.
# GitHub Pages then republishes automatically. Runs entirely in GitHub's cloud —
# no Mac Mini, no server to keep awake.
on:
  schedule:
    - cron: "0 9 1 * *"        # 09:00 UTC on the 1st of every month
  workflow_dispatch: {}         # allow manual "Run workflow" from the Actions tab

permissions:
  contents: write               # lets the run commit & push data updates

concurrency:
  group: monthly-tally
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape counts and rebuild widget
        run: |
          python tally.py --no-backup
          python build_site.py

      - name: Commit & push if data changed
        run: |
          git config user.name  "agent-tally bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "data: monthly agent tally $(date -u +%Y-%m-%d)"
            git push
            echo "Published updated data."
          fi
